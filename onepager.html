<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rise of Rice</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #0d1117;
            --surface: #161b22;
            --border: #30363d;
            --text: #f0f6fc;
            --muted: #8b949e;
            --accent: #58a6ff;
            --success: #238636;
            --danger: #da3633;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ── Password overlay ─────────────────────────────────────────── */
        #pw-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.75);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        #pw-overlay.active {
            display: flex;
        }

        #pw-box {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 36px 40px;
            width: 340px;
            box-shadow: 0 16px 48px rgba(0, 0, 0, 0.6);
        }

        #pw-box h2 {
            color: var(--text);
            margin-bottom: 20px;
            font-size: 1.25em;
            text-align: center;
        }

        #pw-box input {
            width: 100%;
            padding: 12px 14px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-size: 15px;
            margin-bottom: 14px;
        }

        #pw-box input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.15);
        }

        #pw-box button {
            width: 100%;
            padding: 11px;
            background: var(--success);
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        #pw-box button:hover {
            background: #2ea043;
        }

        #pw-error {
            color: #f85149;
            font-size: 13px;
            margin-top: 10px;
            text-align: center;
            min-height: 18px;
        }

        /* ── Admin toolbar ───────────────────────────────────────────── */
        #admin-bar {
            display: none;
            position: sticky;
            top: 0;
            z-index: 900;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 10px 20px;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        #admin-bar.active {
            display: flex;
        }

        #admin-bar span {
            color: var(--accent);
            font-weight: 700;
            font-size: 0.85em;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            margin-right: 6px;
        }

        .btn {
            padding: 8px 16px;
            border-radius: 6px;
            border: 1px solid transparent;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .btn-add-text {
            background: #1f6feb;
            color: #fff;
        }

        .btn-add-text:hover {
            background: #388bfd;
        }

        .btn-add-image {
            background: #6e40c9;
            color: #fff;
        }

        .btn-add-image:hover {
            background: #8957e5;
        }

        .btn-logout {
            background: var(--bg);
            color: var(--muted);
            border-color: var(--border);
            margin-left: auto;
        }

        .btn-logout:hover {
            color: var(--text);
            border-color: var(--muted);
        }

        /* ── Trigger to open password overlay ────────────────────────── */
        #edit-trigger {
            position: fixed;
            bottom: 52px;
            right: 16px;
            width: 36px;
            height: 36px;
            background: transparent;
            border: none;
            cursor: pointer;
            opacity: 0;
            z-index: 800;
        }

        /* ── Main content ────────────────────────────────────────────── */
        #content-area {
            flex: 1;
            padding: 40px 20px 60px;
            max-width: 900px;
            width: 100%;
            margin: 0 auto;
        }

        /* ── Blocks ──────────────────────────────────────────────────── */
        .block {
            position: relative;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 24px 28px;
            margin-bottom: 24px;
            word-break: break-word;
        }

        .block-text-content {
            color: var(--text);
            font-size: 1em;
            line-height: 1.7;
            white-space: pre-wrap;
        }

        .block img {
            max-width: 100%;
            border-radius: 6px;
            display: block;
        }

        /* Admin-only block controls */
        .block-controls {
            display: none;
            position: absolute;
            top: 8px;
            right: 10px;
            gap: 6px;
        }

        body.admin-mode .block-controls {
            display: flex;
        }

        .btn-block-delete {
            background: var(--danger);
            color: #fff;
            border: none;
            border-radius: 4px;
            padding: 4px 10px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-block-delete:hover {
            background: #f85149;
        }

        .btn-block-up,
        .btn-block-down {
            background: var(--border);
            color: var(--text);
            border: none;
            border-radius: 4px;
            padding: 4px 8px;
            font-size: 12px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-block-up:hover,
        .btn-block-down:hover {
            background: var(--muted);
        }

        /* ── Add-block modal ─────────────────────────────────────────── */
        #block-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.75);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        #block-modal.active {
            display: flex;
        }

        #block-modal-box {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 32px 36px;
            width: 520px;
            max-width: 95vw;
            box-shadow: 0 16px 48px rgba(0, 0, 0, 0.6);
        }

        #block-modal-box h2 {
            color: var(--text);
            margin-bottom: 20px;
            font-size: 1.15em;
        }

        #block-modal-box textarea,
        #block-modal-box input[type="text"],
        #block-modal-box input[type="url"] {
            width: 100%;
            padding: 12px 14px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-size: 14px;
            margin-bottom: 14px;
            resize: vertical;
        }

        #block-modal-box textarea {
            min-height: 140px;
            font-family: inherit;
        }

        #block-modal-box textarea:focus,
        #block-modal-box input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.15);
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 4px;
        }

        .btn-modal-save {
            background: var(--success);
            color: #fff;
            border: none;
            border-radius: 6px;
            padding: 10px 22px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-modal-save:hover {
            background: #2ea043;
        }

        .btn-modal-cancel {
            background: var(--bg);
            color: var(--muted);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 10px 18px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-modal-cancel:hover {
            color: var(--text);
        }

        /* image source tabs */
        .img-tabs {
            display: flex;
            gap: 0;
            margin-bottom: 14px;
            border: 1px solid var(--border);
            border-radius: 6px;
            overflow: hidden;
        }

        .img-tab {
            flex: 1;
            padding: 9px;
            background: var(--bg);
            color: var(--muted);
            border: none;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.2s;
        }

        .img-tab.active {
            background: var(--accent);
            color: #fff;
        }

        #img-url-section,
        #img-file-section {
            display: none;
        }

        #img-url-section.active,
        #img-file-section.active {
            display: block;
        }

        #img-file-input {
            width: 100%;
            padding: 10px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--muted);
            font-size: 13px;
            margin-bottom: 14px;
            cursor: pointer;
        }

        /* ── Empty state ─────────────────────────────────────────────── */
        #empty-state {
            text-align: center;
            padding: 80px 20px;
            color: var(--muted);
        }

        #empty-state svg {
            width: 48px;
            height: 48px;
            margin-bottom: 16px;
            opacity: 0.3;
        }

        #empty-state p {
            font-size: 1em;
        }

        /* ── Footer ──────────────────────────────────────────────────── */
        footer {
            border-top: 1px solid var(--border);
            padding: 16px 20px;
            text-align: center;
        }

        footer a {
            color: #21262d;
            font-size: 11px;
            text-decoration: none;
            letter-spacing: 0.3px;
            transition: color 0.3s;
        }

        footer a:hover {
            color: var(--muted);
        }

        /* ── Responsive ──────────────────────────────────────────────── */
        @media (max-width: 600px) {
            #content-area {
                padding: 24px 12px 48px;
            }

            .block {
                padding: 18px 16px;
            }

            #block-modal-box {
                padding: 24px 20px;
            }
        }
    </style>
</head>
<body>

    <!-- ── Password overlay ──────────────────────────────────────────── -->
    <div id="pw-overlay">
        <div id="pw-box">
            <h2>🔒 Anmelden</h2>
            <input type="password" id="pw-input" placeholder="Passwort eingeben …" autocomplete="current-password">
            <button id="pw-submit">Anmelden</button>
            <p id="pw-error"></p>
        </div>
    </div>

    <!-- ── Admin toolbar ─────────────────────────────────────────────── -->
    <div id="admin-bar">
        <span>✏ Bearbeitungsmodus</span>
        <button class="btn btn-add-text" id="btn-add-text">＋ Text-Block</button>
        <button class="btn btn-add-image" id="btn-add-image">＋ Bild-Block</button>
        <button class="btn btn-logout" id="btn-logout">Abmelden</button>
    </div>

    <!-- ── Content area ──────────────────────────────────────────────── -->
    <main id="content-area">
        <div id="empty-state">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <rect x="3" y="3" width="18" height="18" rx="2"/>
                <path d="M3 9h18M9 21V9"/>
            </svg>
            <p>Noch kein Inhalt vorhanden.</p>
        </div>
    </main>

    <!-- ── Hidden edit trigger (bottom-right corner) ─────────────────── -->
    <button id="edit-trigger" title="Bearbeiten" aria-label="Bearbeitungsmodus öffnen"></button>

    <!-- ── Add-block modal ───────────────────────────────────────────── -->
    <div id="block-modal">
        <div id="block-modal-box">
            <h2 id="block-modal-title">Text-Block hinzufügen</h2>

            <!-- text fields -->
            <div id="text-fields">
                <textarea id="text-input" placeholder="Text eingeben …"></textarea>
            </div>

            <!-- image fields -->
            <div id="image-fields" style="display:none">
                <div class="img-tabs">
                    <button class="img-tab active" data-tab="url">URL</button>
                    <button class="img-tab" data-tab="file">Datei hochladen</button>
                </div>
                <div id="img-url-section" class="active">
                    <input type="url" id="img-url-input" placeholder="https://beispiel.de/bild.jpg">
                </div>
                <div id="img-file-section">
                    <input type="file" id="img-file-input" accept="image/*">
                </div>
            </div>

            <div class="modal-actions">
                <button class="btn-modal-cancel" id="block-modal-cancel">Abbrechen</button>
                <button class="btn-modal-save" id="block-modal-save">Speichern</button>
            </div>
        </div>
    </div>

    <footer>
        <a href="index.html">tools</a>
    </footer>

    <script>
    (() => {
        'use strict';

        // ── Configuration ─────────────────────────────────────────────
        // NOTE: This is a static site – any password stored here is visible in the
        // page source. It provides content-editing obfuscation, not real security.
        // To change the password, replace the string below and re-deploy.
        const CORRECT_PASSWORD = 'admin1234'; // ← change this to your desired password

        const STORAGE_KEY = 'onepager_blocks';

        // ── State ─────────────────────────────────────────────────────
        let blocks = [];
        let isAdmin = false;
        let pendingType = null; // 'text' | 'image'

        // ── Elements ──────────────────────────────────────────────────
        const pwOverlay     = document.getElementById('pw-overlay');
        const pwInput       = document.getElementById('pw-input');
        const pwSubmit      = document.getElementById('pw-submit');
        const pwError       = document.getElementById('pw-error');
        const adminBar      = document.getElementById('admin-bar');
        const btnAddText    = document.getElementById('btn-add-text');
        const btnAddImage   = document.getElementById('btn-add-image');
        const btnLogout     = document.getElementById('btn-logout');
        const contentArea   = document.getElementById('content-area');
        const emptyState    = document.getElementById('empty-state');
        const editTrigger   = document.getElementById('edit-trigger');
        const blockModal    = document.getElementById('block-modal');
        const blockModalTitle = document.getElementById('block-modal-title');
        const textFields    = document.getElementById('text-fields');
        const imageFields   = document.getElementById('image-fields');
        const textInput     = document.getElementById('text-input');
        const imgUrlInput   = document.getElementById('img-url-input');
        const imgFileInput  = document.getElementById('img-file-input');
        const modalCancel   = document.getElementById('block-modal-cancel');
        const modalSave     = document.getElementById('block-modal-save');

        // ── Persistence ───────────────────────────────────────────────
        function loadBlocks() {
            try {
                const raw = localStorage.getItem(STORAGE_KEY);
                if (raw) blocks = JSON.parse(raw);
            } catch (e) {
                blocks = [];
            }
        }

        function saveBlocks() {
            try {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(blocks));
            } catch (e) {
                alert('Speichern fehlgeschlagen: Der Browser-Speicher ist voll. Bitte lösche einige Blöcke (besonders große Bilder) und versuche es erneut.');
            }
        }

        // ── Rendering ─────────────────────────────────────────────────
        function render() {
            // Remove existing block elements (keep empty-state)
            document.querySelectorAll('.block').forEach(el => el.remove());

            emptyState.style.display = blocks.length === 0 ? 'block' : 'none';

            blocks.forEach((block, idx) => {
                const el = document.createElement('div');
                el.className = 'block';
                el.dataset.idx = idx;

                // Controls (visible only in admin mode via CSS)
                const controls = document.createElement('div');
                controls.className = 'block-controls';

                const btnUp = document.createElement('button');
                btnUp.className = 'btn-block-up';
                btnUp.textContent = '▲';
                btnUp.title = 'Nach oben';
                btnUp.addEventListener('click', () => moveBlock(idx, -1));

                const btnDown = document.createElement('button');
                btnDown.className = 'btn-block-down';
                btnDown.textContent = '▼';
                btnDown.title = 'Nach unten';
                btnDown.addEventListener('click', () => moveBlock(idx, 1));

                const btnDel = document.createElement('button');
                btnDel.className = 'btn-block-delete';
                btnDel.textContent = '✕';
                btnDel.title = 'Block löschen';
                btnDel.addEventListener('click', () => deleteBlock(idx));

                controls.appendChild(btnUp);
                controls.appendChild(btnDown);
                controls.appendChild(btnDel);
                el.appendChild(controls);

                if (block.type === 'text') {
                    const p = document.createElement('div');
                    p.className = 'block-text-content';
                    p.textContent = block.content;
                    el.appendChild(p);
                } else if (block.type === 'image') {
                    const img = document.createElement('img');
                    img.src = block.src;
                    img.alt = block.alt || 'Bild';
                    el.appendChild(img);
                }

                contentArea.appendChild(el);
            });
        }

        // ── Block operations ──────────────────────────────────────────
        function addBlock(block) {
            blocks.push(block);
            saveBlocks();
            render();
        }

        function deleteBlock(idx) {
            blocks.splice(idx, 1);
            saveBlocks();
            render();
        }

        function moveBlock(idx, dir) {
            const newIdx = idx + dir;
            if (newIdx < 0 || newIdx >= blocks.length) return;
            [blocks[idx], blocks[newIdx]] = [blocks[newIdx], blocks[idx]];
            saveBlocks();
            render();
        }

        // ── Password handling ─────────────────────────────────────────
        function openPasswordOverlay() {
            pwInput.value = '';
            pwError.textContent = '';
            pwOverlay.classList.add('active');
            setTimeout(() => pwInput.focus(), 80);
        }

        function closePasswordOverlay() {
            pwOverlay.classList.remove('active');
        }

        function checkPassword() {
            const val = pwInput.value;
            if (val === CORRECT_PASSWORD) {
                isAdmin = true;
                document.body.classList.add('admin-mode');
                adminBar.classList.add('active');
                closePasswordOverlay();
                pwError.textContent = '';
            } else {
                pwError.textContent = 'Falsches Passwort. Bitte erneut versuchen.';
                pwInput.select();
            }
        }

        function logout() {
            isAdmin = false;
            document.body.classList.remove('admin-mode');
            adminBar.classList.remove('active');
        }

        // ── Modal handling ────────────────────────────────────────────
        function openModal(type) {
            pendingType = type;
            if (type === 'text') {
                blockModalTitle.textContent = 'Text-Block hinzufügen';
                textFields.style.display = 'block';
                imageFields.style.display = 'none';
                textInput.value = '';
                setTimeout(() => textInput.focus(), 80);
            } else {
                blockModalTitle.textContent = 'Bild-Block hinzufügen';
                textFields.style.display = 'none';
                imageFields.style.display = 'block';
                imgUrlInput.value = '';
                imgFileInput.value = '';
                // default to URL tab
                switchImgTab('url');
            }
            blockModal.classList.add('active');
        }

        function closeModal() {
            blockModal.classList.remove('active');
            pendingType = null;
        }

        function saveModal() {
            if (pendingType === 'text') {
                const content = textInput.value.trim();
                if (!content) return;
                addBlock({ type: 'text', content });
                closeModal();
            } else if (pendingType === 'image') {
                const activeTab = document.querySelector('.img-tab.active').dataset.tab;
                if (activeTab === 'url') {
                    const src = imgUrlInput.value.trim();
                    if (!src) return;
                    addBlock({ type: 'image', src });
                    closeModal();
                } else {
                    const file = imgFileInput.files[0];
                    if (!file) return;
                    // Validate file type
                    if (!file.type.startsWith('image/')) {
                        alert('Bitte eine Bilddatei auswählen (z. B. JPG, PNG, GIF, WebP).');
                        return;
                    }
                    // Limit to 5 MB to avoid filling localStorage
                    const MAX_SIZE_MB = 5;
                    if (file.size > MAX_SIZE_MB * 1024 * 1024) {
                        alert(`Die Datei ist zu groß. Bitte eine Datei unter ${MAX_SIZE_MB} MB wählen.`);
                        return;
                    }
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        addBlock({ type: 'image', src: e.target.result });
                        closeModal();
                    };
                    reader.readAsDataURL(file);
                }
            }
        }

        function switchImgTab(tab) {
            document.querySelectorAll('.img-tab').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.tab === tab);
            });
            document.getElementById('img-url-section').classList.toggle('active', tab === 'url');
            document.getElementById('img-file-section').classList.toggle('active', tab === 'file');
        }

        // ── Event listeners ───────────────────────────────────────────
        editTrigger.addEventListener('click', openPasswordOverlay);

        pwSubmit.addEventListener('click', checkPassword);
        pwInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') checkPassword();
            if (e.key === 'Escape') closePasswordOverlay();
        });

        pwOverlay.addEventListener('click', (e) => {
            if (e.target === pwOverlay) closePasswordOverlay();
        });

        btnAddText.addEventListener('click', () => openModal('text'));
        btnAddImage.addEventListener('click', () => openModal('image'));
        btnLogout.addEventListener('click', logout);

        modalCancel.addEventListener('click', closeModal);
        modalSave.addEventListener('click', saveModal);

        blockModal.addEventListener('click', (e) => {
            if (e.target === blockModal) closeModal();
        });

        document.querySelectorAll('.img-tab').forEach(btn => {
            btn.addEventListener('click', () => switchImgTab(btn.dataset.tab));
        });

        // Ctrl/Cmd+E shortcut to open edit mode
        document.addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.metaKey) && e.key === 'e' && !isAdmin) {
                e.preventDefault();
                openPasswordOverlay();
            }
            if (e.key === 'Escape') {
                closeModal();
                closePasswordOverlay();
            }
        });

        // ── Init ──────────────────────────────────────────────────────
        loadBlocks();
        render();
    })();
    </script>
</body>
</html>
